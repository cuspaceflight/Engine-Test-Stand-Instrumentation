; PlatformIO configuration for the CUSF Actuation Board
; ESP32-S3-DevKitC-1 with Arduino framework
;
; ─────────────────────────────────────────────────────────────────────────────
; ⚠ TOOLCHAIN REPRODUCIBILITY / API-VERSION HAZARD  (read CODE_OVERVIEW.md §1)
;
;   `platform = espressif32` (unpinned) resolves to the LATEST release every
;   time the toolchain is reinstalled. The firmware uses the Arduino-ESP32
;   core 2.0.x APIs:
;       - LEDC:        ledcSetup() / ledcAttachPin() / ledcWrite(channel,duty)
;       - Task WDT:    esp_task_wdt_init(timeout_seconds, panic_bool)
;   Core 3.0.x REMOVED that LEDC API and CHANGED the WDT init signature, so an
;   unpinned upgrade can silently break the build (or behaviour) of hardware
;   that controls propellant valves.
;
;   For a test-stand controller you want a PINNED, reproducible toolchain.
;   Confirm your installed core in the build log:  framework-arduinoespressif32 @ x.y.z
;   Then pin the platform release that provides it — e.g. (verify the version
;   that maps to core 2.0.x for your PlatformIO install before committing):
;
;       platform = espressif32 @ 6.5.0     ; <-- example; uncomment & verify
;
;   If you are intentionally on core 3.x, migrate the two APIs above instead
;   of pinning. Either way: pick one and pin it.
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
; All source and header files live in the project root (not the default src/
; and include/ subdirectories). src_dir and include_dir both point to ".".
src_dir     = .
include_dir = .

; ─── Shared settings inherited by both environments ──────────────────────────
[common]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Native USB: the ESP32-S3 exposes a USB CDC device directly.
; ARDUINO_USB_MODE=1 selects the hardware USB-Serial-JTAG (HWCDC) interface.
; ARDUINO_USB_CDC_ON_BOOT=1 starts CDC at boot so Serial is available
; immediately. (Note: with these flags Serial is HWCDC, not TinyUSB USBCDC —
; relevant if you ever add Serial.setTxTimeoutMs(); see CODE_OVERVIEW.md §1.)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ─── v1 environment (original board, GPIOs 10–13 for servos) ─────────────────
; Build: pio run -e esp32s3
; Flash: pio run -e esp32s3 -t upload
[env:esp32s3]
platform     = ${common.platform}
board        = ${common.board}
framework    = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags  = ${common.build_flags}
; NOTE: `src_filter` is the deprecated name; newer PlatformIO prefers
; `build_src_filter` (same syntax). Either works for now.
src_filter = -<*> +<main.cpp>

; ─── v3 environment (v2 PCB: CAN bus, GPIOs 4–7 for servos) ─────────────────
; Build: pio run -e esp32s3_v3
; Flash: pio run -e esp32s3_v3 -t upload
; Monitor: pio run -e esp32s3_v3 -t monitor
[env:esp32s3_v3]
platform     = ${common.platform}
board        = ${common.board}
framework    = ${common.framework}
monitor_speed = ${common.monitor_speed}
; CORE_DEBUG_LEVEL=3 surfaces ESP-IDF log messages (including TWAI driver
; errors) through Serial — useful during bringup. Set to 0 before a live test.
build_flags  =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=3
; Compile only main_v3.cpp; pins_v3.h and calibration.h are headers and are
; included automatically.
src_filter = -<*> +<main_v3.cpp>