; PlatformIO configuration for the CUSF Actuation Board
; ESP32-S3-DevKitC-1 with Arduino framework

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Use native USB for serial (not the UART bridge)
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
