; PlatformIO configuration for the CUSF Actuation Board
; ESP32-S3-DevKitC-1 with Arduino framework

[platformio]
; All source and header files live in the project root (not the default src/
; and include/ subdirectories). src_dir and include_dir both point to ".".
src_dir     = .
include_dir = .

; ─── Shared settings inherited by both environments ──────────────────────────
[common]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Native USB: the ESP32-S3 exposes a USB CDC device directly.
; ARDUINO_USB_MODE=1 selects the native USB stack over the UART bridge.
; ARDUINO_USB_CDC_ON_BOOT=1 starts the CDC interface at boot so Serial
; is available immediately without calling Serial.begin() first.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ─── v1 environment (original board, GPIOs 10–13 for servos) ─────────────────
; Build: pio run -e esp32s3
; Flash: pio run -e esp32s3 -t upload
[env:esp32s3]
platform     = ${common.platform}
board        = ${common.board}
framework    = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags  = ${common.build_flags}
; Compile only main.cpp; exclude main_v3.cpp and ESP_V1.cpp so their
; duplicate setup()/loop() definitions do not cause a linker error.
src_filter = -<*> +<main.cpp>

; ─── v3 environment (v2 PCB: CAN bus, GPIOs 4–7 for servos) ─────────────────
; Build: pio run -e esp32s3_v3
; Flash: pio run -e esp32s3_v3 -t upload
; Monitor: pio run -e esp32s3_v3 -t monitor
[env:esp32s3_v3]
platform     = ${common.platform}
board        = ${common.board}
framework    = ${common.framework}
monitor_speed = ${common.monitor_speed}
; CORE_DEBUG_LEVEL=3 surfaces ESP-IDF log messages (including TWAI driver
; errors) through the Arduino Serial interface — useful during bringup.
; Remove or set to 0 before a live test to reduce serial noise.
build_flags  =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=3
; Compile only main_v3.cpp; calibration.h and pins_v3.h are headers
; and are included automatically — they do not need to be in src_filter.
src_filter = -<*> +<main_v3.cpp>
